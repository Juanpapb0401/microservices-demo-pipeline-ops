{{- range .Values.kafka.topics }}
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-{{ .name }}
  labels:
    app: kafka
    component: topic-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: kafka
        component: topic-init
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-kafka
        image: "{{ $.Values.kafka.image.repository }}:{{ $.Values.kafka.image.tag }}"
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for Kafka to be ready..."
          until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:{{ $.Values.kafka.service.port }} > /dev/null 2>&1; do
            echo "Kafka not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Kafka is ready!"
      containers:
      - name: create-topic
        image: "{{ $.Values.kafka.image.repository }}:{{ $.Values.kafka.image.tag }}"
        command:
        - /bin/bash
        - -c
        - |
          echo "Creating topic '{{ .name }}' with {{ .partitions }} partitions..."
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:{{ $.Values.kafka.service.port }} \
            --create \
            --if-not-exists \
            --topic {{ .name }} \
            --partitions {{ .partitions }} \
            --replication-factor {{ .replicationFactor }}
          echo "Topic '{{ .name }}' created successfully."
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:{{ $.Values.kafka.service.port }} \
            --describe \
            --topic {{ .name }}
---
{{- end }}
