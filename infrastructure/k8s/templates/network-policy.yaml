# Deny all ingress by default for every pod in this namespace.
# Each service that needs to receive traffic has its own explicit allow rule below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# vote: accepts traffic from anywhere (LoadBalancer → users)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-vote
spec:
  podSelector:
    matchLabels:
      app: vote
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - port: 8080
---
# result: accepts traffic from anywhere (LoadBalancer → users)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-result
spec:
  podSelector:
    matchLabels:
      app: result
  policyTypes:
  - Ingress
  ingress:
  - ports:
    - port: 80
---
# kafka: accepts connections from vote (producer), worker (consumer),
# and the kafka-topic-init Job (component: topic-init) that runs as a Helm hook
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-kafka
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: vote
    - podSelector:
        matchLabels:
          app: worker
    - podSelector:
        matchLabels:
          component: topic-init
    ports:
    - port: 9092
---
# postgresql: accepts connections only from worker (writes) and result (reads)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-postgresql
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: worker
    - podSelector:
        matchLabels:
          app: result
    ports:
    - port: 5432
